<!DOCTYPE html>
<html lang="en">
<head>

    <link rel="stylesheet" href="registration.css">
    <title>Registration Page</title>
    <script src="script.js"></script>
    <link rel="icon" href="./img/logo.png">
</head>
<body>
    
    <div class="main">
    <div class="first">
    </div>
    <div class="second">
        <div class="f-text">
            <div class="welcome">
                Welcome to 
            </div>
            <div class="waste-text">
                <!-- WasteAlert -->
                <p class="waste_text"></p>
            </div>
        </div>
        <p class="sign-text">Sign Up</p>
        <form action="#" onsubmit="handlesubmit()">

            <input type="password" placeholder="Password" value="" class="password"> <br>
            <input type="password" placeholder="Confirm Password" value="" class="c-password">  
            <div class="pass-text"></div><br>
           
            <input type="submit"  class="submit" value="Sign Up"> <br>
        </form>
        <button class="registration-btn"><a href="login.html">Alreay have a account?</a></button>
    </div> 
</div>
</body>
</html>
